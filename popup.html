<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TT Chat Unblock</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 300px; font-family: system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; font-size: 13px; }
    .header { background: linear-gradient(135deg, #16213e, #0f3460); padding: 14px 16px; text-align: center; border-bottom: 1px solid #333; }
    .header h1 { font-size: 15px; color: #4f8; }
    .header .ver { font-size: 10px; color: #888; margin-top: 2px; }
    .dot-row { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #4f8; box-shadow: 0 0 6px #4f8; }
    .dot.off { background: #f44; box-shadow: 0 0 6px #f44; }
    .content { padding: 10px 16px; }

    .setting { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid #2a2a3e; }
    .setting-label { display: flex; flex-direction: column; }
    .setting-label .t { font-weight: 600; }
    .setting-label .d { font-size: 10px; color: #888; margin-top: 1px; }

    .toggle { position: relative; width: 42px; height: 22px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .s { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #444; border-radius: 22px; transition: 0.2s; }
    .toggle .s::before { content: ""; position: absolute; width: 16px; height: 16px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.2s; }
    .toggle input:checked + .s { background: #4f8; }
    .toggle input:checked + .s::before { transform: translateX(20px); }

    .lang-select { width: 100%; padding: 5px 8px; margin: 6px 0; background: #2a2a3e; color: #e0e0e0; border: 1px solid #444; border-radius: 4px; font-size: 12px; }

    .copy-row { display: flex; gap: 6px; margin: 8px 0 4px; }
    .copy-row input { flex: 1; padding: 5px 8px; font-size: 10px; background: #2a2a3e; color: #aaa; border: 1px solid #444; border-radius: 4px; user-select: all; }
    .copy-row button { padding: 5px 10px; font-size: 11px; white-space: nowrap; background: #0f3460; color: #4f8; border: 1px solid #4f8; border-radius: 4px; cursor: pointer; transition: 0.15s; }
    .copy-row button:hover { background: #4f8; color: #1a1a2e; }

    .btn-row { margin: 8px 0; }
    .btn-row button { width: 100%; padding: 7px; font-size: 12px; background: #0f3460; color: #f80; border: 1px solid #f80; border-radius: 4px; cursor: pointer; transition: 0.15s; }
    .btn-row button:hover { background: #f80; color: #1a1a2e; }

    .warning { background: #3a2a00; border: 1px solid #fc0; border-radius: 4px; padding: 8px 10px; margin: 8px 0; font-size: 11px; color: #fc0; display: flex; gap: 6px; align-items: flex-start; }
    .warn-icon { font-size: 14px; flex-shrink: 0; }
    .warn-text { line-height: 1.4; }

    .version-row { display: flex; align-items: center; gap: 6px; padding: 6px 0; margin-top: 4px; }
    .ver-dot { width: 8px; height: 8px; border-radius: 50%; background: #888; flex-shrink: 0; }
    .ver-dot-inline.major { background: #f44; }
    .ver-dot-inline.minor { background: #fc0; }
    .ver-dot-inline.ok { background: #4f8; }
    .ver-dot.ok { background: #4f8; box-shadow: 0 0 6px #4f8; }
    .ver-text { font-size: 11px; color: #aaa; }

    .footer { padding: 8px 16px; text-align: center; border-top: 1px solid #333; font-size: 10px; color: #666; }
    .footer a { color: #4f8; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🛡 TT Chat Unblock</h1>
    <div class="ver" id="verLabel"><span class="ver-dot-inline ok" id="verDot"></span> v2.2 — Stable</div>
    <div class="dot-row">
      <div class="dot" id="dot"></div>
      <span id="sText">Active</span>
    </div>
  </div>

  <div class="content" id="mainContent" style="display:none">
    <!-- 开关 -->
    <div class="setting">
      <div class="setting-label">
        <span class="t" id="lblOn">Enable Extension</span>
        <span class="d" id="dOn">Turn on/off message encoding</span>
      </div>
      <label class="toggle"><input type="checkbox" id="tglOn"><span class="s"></span></label>
    </div>

    <div class="setting">
      <div class="setting-label">
        <span class="t" id="lblSig">Signature</span>
        <span class="d" id="dSig">Append [Chat Unblocker] tag for non-users</span>
      </div>
      <label class="toggle"><input type="checkbox" id="tglSig"><span class="s"></span></label>
    </div>

    <!-- 格式选择 -->
    <div class="setting">
      <div class="setting-label">
        <span class="t" id="lblFmt">Message Format</span>
        <span class="d" id="dFmt">V2.2 is recommended</span>
      </div>
      <select class="lang-select" id="fmtSel" style="width:auto;padding:3px 6px;margin:0;font-size:11px;">
        <option value="v2">V2.2 (~XXXX)</option>
        <option value="v1">V1.2 (\uXXXX)</option>
      </select>
    </div>

    <!-- V1.2 警告 -->
    <div class="warning" id="warnBox" style="display:none;">
      <span class="warn-icon">⚠</span>
      <span class="warn-text" id="warnText"></span>
    </div>

    <!-- 语言选择 -->
    <select class="lang-select" id="langSel">
      <option value="en">English</option>
      <option value="zh">中文 (Chinese)</option>
      <option value="ja">日本語 (Japanese)</option>
      <option value="ko">한국어 (Korean)</option>
      <option value="ru">Русский (Russian)</option>
      <option value="ar">العربية (Arabic)</option>
      <option value="fr">Français (French)</option>
      <option value="es">Español (Spanish)</option>
      <option value="de">Deutsch (German)</option>
      <option value="pt">Português (Portuguese)</option>
    </select>

    <!-- 各语言对应链接 + 复制 -->
    <div class="copy-row">
      <input type="text" id="linkInput" readonly>
      <button id="copyBtn">Copy</button>
    </div>

    <!-- 重置按钮 -->
    <div class="btn-row">
      <button id="resetBtn">Reset Chat Input & Copy</button>
    </div>

    <!-- 版本检测 -->

  <div class="footer">
    <span id="footerText">Made by L_Shy_P</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
